<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>整理番号発行</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: sans-serif;
      text-align: center;
    }

    h1 {
      font-size: 7vw;
      margin-top: 6vh;
    }

    .description {
      font-size: 4.5vw;
      margin: 2vh 0;
    }

    label {
      font-size: 4.5vw;
      display: block;
      margin: 2vh 0;
    }

    input {
      font-size: 5vw;
      padding: 12px;
      width: 90%;
      max-width: 420px;
      margin-bottom: 2vh;
    }

    button {
      font-size: 6vw;
      padding: 20px;
      width: 90%;
      max-width: 420px;
    }

    .number {
      margin-top: 6vh;
      font-size: 25vw;
      color: blue;
    }
  </style>
</head>

<body>

<h1>整理番号を発行します</h1>

<p class="description">
  LINE通知は任意です。<br>
  通知を希望しない場合は番号表示を確認してください。
</p>

<label>
  <input type="checkbox" id="useLine">
  LINEで呼び出し通知を受け取る
</label>

<div id="lineArea" style="display:none;">
  <input id="lineUserId" placeholder="LINEユーザーIDを入力">
</div>

<button onclick="issue()">整理番号を発行</button>

<div class="number" id="myNumber"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import {
    getFirestore,
    doc,
    getDoc,
    updateDoc,
    collection,
    addDoc
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCp0b5owSOIq5QDJHJKkxtOdwVk9roJ3VI",
    authDomain: "soudan-cd1c7.firebaseapp.com",
    projectId: "soudan-cd1c7"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const systemRef = doc(db, "systems", "main");

  document.getElementById("useLine").addEventListener("change", (e) => {
    document.getElementById("lineArea").style.display =
      e.target.checked ? "block" : "none";
  });

  async function issue() {
    if (localStorage.getItem("issued")) {
      alert("この端末ではすでに整理番号を発行しています。");
      return;
    }

    const useLine = document.getElementById("useLine").checked;
    const lineUserId = document.getElementById("lineUserId").value.trim();

    if (useLine && !lineUserId) {
      alert("LINE通知を利用する場合はユーザーIDを入力してください。");
      return;
    }

    const snap = await getDoc(systemRef);
    const data = snap.data();

    const issueNumber = data.issueNumber;
    const queue = data.queue;

    document.getElementById("myNumber").textContent = issueNumber;
    queue.push(issueNumber);

    await updateDoc(systemRef, {
      issueNumber: issueNumber + 1,
      queue: queue
    });

    await addDoc(collection(db, "tickets"), {
      number: issueNumber,
      lineUserId: useLine ? lineUserId : null,
      notified: false,
      createdAt: new Date()
    });

    localStorage.setItem("issued", "true");
  }

  window.issue = issue;
</script>

</body>
</html>
