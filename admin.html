<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>管理画面</title>
  <style>
    body {
  margin: 0;
  padding: 0 10px;
  font-family: sans-serif;
}

h1 {
  font-size: 7vw;
  text-align: center;
}

button {
  font-size: 5.5vw;
  padding: 20px;
  margin: 10px 0;
  width: 100%;
}

.current {
  font-size: 22vw;
  color: red;
  text-align: center;
}

#waitingAdmin {
  font-size: 6vw;
  text-align: center;
  margin-bottom: 10px;
}

#called {
  font-size: 4.5vw;
  text-align: center;
}

.warning {
  font-size: 5vw;
  color: orange;
  text-align: center;
  margin-top: 10px;
}
  </style>
</head>

<body>

<h1>管理画面</h1>

<button class="call" onclick="callNext()">次の番号を呼び出す</button>
<button class="reset" onclick="resetAll()">全リセット</button>

<h2>現在呼び出し番号</h2>
<div class="current" id="current">---</div>

<h2>待ち人数</h2>
<div id="waitingAdmin"></div>

<h2>呼び出し済み番号</h2>
<div id="called"></div>

<div class="warning" id="warning"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import {
    getFirestore,
    doc,
    getDoc,
    updateDoc,
    onSnapshot
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCp0b5owSOIq5QDJHJKkxtOdwVk9roJ3VI",
    authDomain: "soudan-cd1c7.firebaseapp.com",
    projectId: "soudan-cd1c7"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const systemRef = doc(db, "systems", "main");

  async function callNext() {
    const snap = await getDoc(systemRef);
    const data = snap.data();

    let { queue, currentNumber, calledNumbers } = data;

    if (queue.length === 0) {
      alert("呼び出し待ちの番号がありません");
      return;
    }

    if (currentNumber !== null) {
      calledNumbers.unshift(currentNumber);
      calledNumbers = calledNumbers.slice(0, 10);
    }

    const next = queue.shift();

    await updateDoc(systemRef, {
      currentNumber: next,
      queue: queue,
      calledNumbers: calledNumbers,
      calledAt: new Date()
    });
  }

  async function resetAll() {
    if (!confirm("すべてリセットします。よろしいですか？")) return;

    await updateDoc(systemRef, {
      issueNumber: 1,
      queue: [],
      currentNumber: null,
      calledNumbers: [],
      calledAt: null
    });
  }

  onSnapshot(systemRef, (docSnap) => {
    const data = docSnap.data();

    document.getElementById("current").textContent =
      data.currentNumber !== null ? data.currentNumber : "---";

    document.getElementById("called").textContent =
      data.calledNumbers.length > 0 ? data.calledNumbers.join(" , ") : "";

    document.getElementById("waitingAdmin").textContent =
      `${data.queue.length} 人待ち`;

    const warningEl = document.getElementById("warning");

    if (!data.calledAt) {
      warningEl.textContent = "";
      return;
    }

    const now = new Date();
    const diffMin = (now - data.calledAt.toDate()) / 1000 / 60;

    if (diffMin >= 10) {
      warningEl.textContent =
        "10分以上反応がありません。次の番号を呼び出してください。";
    } else {
      warningEl.textContent = "";
    }
  });

  window.callNext = callNext;
  window.resetAll = resetAll;
</script>

</body>
</html>
