<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>管理画面</title>
  <style>
    body {
      font-family: sans-serif;
    }
    button {
      font-size: 18px;
      padding: 10px 20px;
      margin: 10px;
    }
    .call {
      background-color: #4CAF50;
      color: white;
    }
    .reset {
      background-color: #e53935;
      color: white;
    }
    .current {
      font-size: 60px;
      color: red;
      margin: 10px 0;
    }
    .warning {
      color: orange;
      font-size: 24px;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<h1>管理画面</h1>

<button class="call" onclick="callNext()">次の番号を呼び出す</button>
<button class="reset" onclick="resetAll()">全リセット</button>

<h2>現在呼び出し番号</h2>
<div class="current" id="current">---</div>

<div id="waiting" style="
  font-size: 36px;
  margin-top: 20px;
  color: #333;
">
</div>

<h2>呼び出し済み番号</h2>
<div id="called"></div>

<h2>待ち人数</h2>
<div id="waitingAdmin" style="font-size:32px;"></div>

<div class="warning" id="warning"></div>

<!-- ===================== -->
<!-- Firebase / Firestore -->
<!-- ===================== -->
<script type="module">

/* ===== Firebase SDK ===== */
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
  getFirestore,
  doc,
  getDoc,
  updateDoc,
  onSnapshot
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

/* ===== Firebase設定（自分のに置き換え） ===== */
const firebaseConfig = {
  apiKey: "AIzaSyCp0b5owSOIq5QDJHJKkxtOdwVk9roJ3VI",
  authDomain: "soudan-cd1c7.firebaseapp.com",
  projectId: "soudan-cd1c7",
};

/* ===== 初期化 ===== */
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const systemRef = doc(db, "systems", "main");

/* ===================== */
/* 次の番号を呼び出す */
/* ===================== */
async function callNext() {
  const snap = await getDoc(systemRef);
  const data = snap.data();

  let { queue, currentNumber, calledNumbers } = data;

  if (queue.length === 0) {
    alert("呼び出し待ちの番号がありません");
    return;
  }

  // 直前の番号を履歴へ
  if (currentNumber !== null) {
    calledNumbers.unshift(currentNumber);
    calledNumbers = calledNumbers.slice(0, 10);
  }

  const next = queue.shift();

  await updateDoc(systemRef, {
    currentNumber: next,
    queue: queue,
    calledNumbers: calledNumbers,
    calledAt: new Date()   // ← 10分チェック用
  });
}

/* ===================== */
/* 全リセット */
/* ===================== */
async function resetAll() {
  if (!confirm("整理番号・呼び出し状況をすべてリセットします。よろしいですか？")) return;

  await updateDoc(systemRef, {
    issueNumber: 1,
    queue: [],
    currentNumber: null,
    calledNumbers: [],
    calledAt: null
  });
}

/* ===================== */
/* リアルタイム表示 */
/* ===================== */
onSnapshot(systemRef, (docSnap) => {
  const data = docSnap.data();

  /* 現在呼び出し番号 */
  document.getElementById("current").textContent =
    data.currentNumber !== null ? data.currentNumber : "---";

  /* 呼び出し済み番号 */
  document.getElementById("called").textContent =
    data.calledNumbers.length > 0 ? data.calledNumbers.join(" , ") : "";

  /* 10分経過チェック */
  const warningEl = document.getElementById("warning");
  if (!data.calledAt) {
    warningEl.textContent = "";
    return;
  document.getElementById("waitingAdmin").textContent =
  `${data.queue.length} 人待ち`;

  }

  const now = new Date();
  const diffMin = (now - data.calledAt.toDate()) / 1000 / 60;

  if (diffMin >= 10) {
    warningEl.textContent =
      "10分以上反応がありません。次の番号を呼び出してください。";
  } else {
    warningEl.textContent = "";
  }
});

/* ===================== */
/* HTMLから呼べるように */
/* ===================== */
window.callNext = callNext;
window.resetAll = resetAll;

</script>

</body>
</html>
