<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>呼び出し番号表示</title>
  <style>
    body {
      font-family: sans-serif;
      text-align: center;
    }
    h1 {
      font-size: 48px;
    }
    .current {
      font-size: 120px;
      color: red;
      margin-bottom: 40px;
    }
    .list {
      font-size: 36px;
    }
  </style>
</head>

<body>

<h1 style="font-size:64px;">ただいま呼び出し中</h1>

<div style="
  font-size:160px;
  color:#d32f2f;
  margin:40px 0;
">
  12
</div>

<div style="font-size:36px;">
  整理番号 <b>13</b> 以降の方は<br>
  このままお待ちください
</div>

<hr style="margin:40px;">

<div style="font-size:28px; color:#555;">
  呼び出し済み：9 , 10 , 11
</div>
``
<!-- ▼ Firebase & JS -->
<script type="module">
  // ① Firebase SDK
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  // ② Firebase設定（他と同じ）
  const firebaseConfig = {
    apiKey: "AIzaSyCp0b5owSOIq5QDJHJKkxtOdwVk9roJ3VI",
    authDomain: "soudan-cd1c7.firebaseapp.com",
    projectId: "soudan-cd1c7",
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // ③ systems/main
  const systemRef = doc(db, "systems", "main");

  // ④ リアルタイム監視
  onSnapshot(systemRef, (docSnap) => {
    const data = docSnap.data();
    const current = data.currentNumber;
    const called = data.calledNumbers;

    const waitingCount = data.queue.length;

    document.getElementById("waiting").textContent =
      `現在の待ち人数：${waitingCount}人`;

    // 現在呼び出し番号
    document.getElementById("current").textContent =
      current !== null ? current : "---";

    // 呼び出し済み番号（最大10件）
    document.getElementById("called").textContent =
      called.length > 0 ? called.join(" , ") : "";
  });
</script>

</body>
</html>
