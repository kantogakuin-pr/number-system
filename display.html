<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>呼び出し番号表示</title>
  <style>
    body {
      font-family: sans-serif;
      text-align: center;
    }
    h1 {
      font-size: 48px;
    }
    .current {
      font-size: 140px;
      color: red;
      margin: 40px 0;
    }
    .waiting {
      font-size: 32px;
      margin-bottom: 20px;
    }
    .called {
      font-size: 28px;
      color: #555;
    }
  </style>
</head>

<body>

<h1>ただいま呼び出し中</h1>

<div class="current" id="current">---</div>

<div class="waiting" id="waiting"></div>

<h2>呼び出し済み番号</h2>
<div class="called" id="called"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import {
    getFirestore,
    doc,
    onSnapshot
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCp0b5owSOIq5QDJHJKkxtOdwVk9roJ3VI",
    authDomain: "soudan-cd1c7.firebaseapp.com",
    projectId: "soudan-cd1c7"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const systemRef = doc(db, "systems", "main");

  onSnapshot(systemRef, (docSnap) => {
    const data = docSnap.data();

    document.getElementById("current").textContent =
      data.currentNumber !== null ? data.currentNumber : "---";

    document.getElementById("waiting").textContent =
      `現在の待ち人数：${data.queue.length} 人`;

    document.getElementById("called").textContent =
      data.calledNumbers.length > 0 ? data.calledNumbers.join(" , ") : "";
  });
</script>

</body>
</html>
