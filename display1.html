<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>呼び出し番号表示</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: sans-serif;
      text-align: center;
      background: #ffffff;
    }

    h1 {
      font-size: 6vw;
      margin-top: 4vh;
    }

    .current {
      font-size: 25vw;
      color: red;
      margin: 4vh 0;
    }

    .waiting {
      font-size: 6vw;
      margin-bottom: 3vh;
    }

    h2 {
      font-size: 4.5vw;
      margin-top: 3vh;
    }

    .called {
      font-size: 4vw;
      color: #555;
    }
  </style>
</head>

<body>

<h1>ただいま呼び出し中</h1>

<div class="current" id="current">---</div>

<div class="waiting" id="waiting"></div>

<h2>呼び出し済み番号</h2>
<div class="called" id="called"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import {
    getFirestore,
    doc,
    onSnapshot
  } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  // Firebase 設定（admin / issue と同じ）
  const firebaseConfig = {
    apiKey: "AIzaSyCp0b5owSOIq5QDJHJKkxtOdwVk9roJ3VI",
    authDomain: "soudan-cd1c7.firebaseapp.com",
    projectId: "soudan-cd1c7"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const systemRef = doc(db, "systems", "main");

  // DOM参照（先に取得して安定化）
  const currentEl = document.getElementById("current");
  const waitingEl = document.getElementById("waiting");
  const calledEl = document.getElementById("called");

  // リアルタイム監視
  onSnapshot(systemRef, (docSnap) => {
    const data = docSnap.data();

    const queue = data.queue || [];
    const calledNumbers = data.calledNumbers || [];

    // 現在呼び出し番号
    currentEl.textContent =
      data.currentNumber !== null ? data.currentNumber : "---";

    // 待ち人数
    waitingEl.textContent =
      `現在の待ち人数：${queue.length} 人`;

    // 呼び出し済み番号
    calledEl.textContent =
      calledNumbers.length > 0 ? calledNumbers.join(" , ") : "";
  });
</script>

</body>
</html>
``
